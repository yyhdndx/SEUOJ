<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SEU OJ</title>
  <link rel="stylesheet" href="./styles.css">
  <script>
    window.codeMirrorReadyPromise = new Promise((resolve, reject) => {
      window.__resolveCodeMirrorReady = resolve;
      window.__rejectCodeMirrorReady = reject;
    });
  </script>
  <script type="importmap">
    {
      "imports": {
        "codemirror": "./CodeMirror/node_modules/codemirror/dist/index.js",
        "@codemirror/autocomplete": "./CodeMirror/node_modules/@codemirror/autocomplete/dist/index.js",
        "@codemirror/commands": "./CodeMirror/node_modules/@codemirror/commands/dist/index.js",
        "@codemirror/lang-cpp": "./CodeMirror/node_modules/@codemirror/lang-cpp/dist/index.js",
        "@codemirror/lang-go": "./CodeMirror/node_modules/@codemirror/lang-go/dist/index.js",
        "@codemirror/lang-java": "./CodeMirror/node_modules/@codemirror/lang-java/dist/index.js",
        "@codemirror/lang-python": "./CodeMirror/node_modules/@codemirror/lang-python/dist/index.js",
        "@codemirror/lang-rust": "./CodeMirror/node_modules/@codemirror/lang-rust/dist/index.js",
        "@codemirror/language": "./CodeMirror/node_modules/@codemirror/language/dist/index.js",
        "@codemirror/lint": "./CodeMirror/node_modules/@codemirror/lint/dist/index.js",
        "@codemirror/search": "./CodeMirror/node_modules/@codemirror/search/dist/index.js",
        "@codemirror/state": "./CodeMirror/node_modules/@codemirror/state/dist/index.js",
        "@codemirror/view": "./CodeMirror/node_modules/@codemirror/view/dist/index.js",
        "@lezer/common": "./CodeMirror/node_modules/@lezer/common/dist/index.js",
        "@lezer/cpp": "./CodeMirror/node_modules/@lezer/cpp/dist/index.js",
        "@lezer/go": "./CodeMirror/node_modules/@lezer/go/dist/index.js",
        "@lezer/highlight": "./CodeMirror/node_modules/@lezer/highlight/dist/index.js",
        "@lezer/java": "./CodeMirror/node_modules/@lezer/java/dist/index.js",
        "@lezer/lr": "./CodeMirror/node_modules/@lezer/lr/dist/index.js",
        "@lezer/python": "./CodeMirror/node_modules/@lezer/python/dist/index.js",
        "@lezer/rust": "./CodeMirror/node_modules/@lezer/rust/dist/index.js",
        "@marijn/find-cluster-break": "./CodeMirror/node_modules/@marijn/find-cluster-break/src/index.js",
        "crelt": "./CodeMirror/node_modules/crelt/index.js",
        "style-mod": "./CodeMirror/node_modules/style-mod/src/style-mod.js",
        "w3c-keyname": "./CodeMirror/node_modules/w3c-keyname/index.js"
      }
    }
  </script>
</head>
<body>
  <div class="page-shell">
    <header class="topbar">
      <div class="brand-block">
        <a class="brand" href="#/problems">SEU OJ</a>
        <span class="brand-note">Compact coding arena for SEU</span>
      </div>
      <nav class="topnav">
        <div class="topnav-main">
          <a href="#/">Home</a>
          <a href="#/problems">Problems</a>
          <a href="#/contests">Contests</a>
          <a href="#/playlists">Playlists</a>
          <a href="#/forum">Forum</a>
        </div>
        <details class="nav-menu">
          <summary>More</summary>
          <div class="nav-menu-panel">
            <a href="#/rankings">Rankings</a>
            <a href="#/announcements">Announcements</a>
            <a href="#/submissions">Submissions</a>
            <a href="#/classes" id="classes-link" style="display:none;">Classes</a>
            <a href="#/profile" id="profile-link" style="display:none;">Profile</a>
          </div>
        </details>
      </nav>
      <div class="account-slot" id="account-slot"></div>
    </header>

    <main class="content content-full">
      <div id="flash" class="flash hidden"></div>
      <div id="app"></div>
    </main>
  </div>

  <script type="module">
    import("./js/codemirror-loader.js")
      .then(() => {
        if (typeof window.__resolveCodeMirrorReady === "function") {
          window.__resolveCodeMirrorReady();
        }
      })
      .catch((error) => {
        window.codeMirrorLoadError = error;
        console.error("[codemirror-loader]", error);
        if (typeof window.__rejectCodeMirrorReady === "function") {
          window.__rejectCodeMirrorReady(error);
        }
      });
  </script>
  <script src="./app.js"></script>
  <script src="./js/general-pages.js"></script>
  <script src="./js/admin.js"></script>
  <script src="./js/problems.js"></script>
  <script src="./js/problem-solutions.js"></script>
  <script src="./js/submissions.js"></script>
  <script src="./js/contests.js"></script>
  <script src="./js/teaching.js"></script>
  <script src="./js/forum.js"></script>
  <script src="./js/bootstrap.js"></script>
</body>
</html>
